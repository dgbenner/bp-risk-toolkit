<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BP Risk Toolkit</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Encodes the 404'd path into a ?/sentinel query so index.html's
      // decoder can restore it via history.replaceState before React boots.
      // pathSegmentsToKeep = 1 because we're served under /bp-risk-toolkit/.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
