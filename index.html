<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>BP Risk Toolkit — Service Blueprints</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — decoder half.
      // https://github.com/rafgraph/spa-github-pages
      // Runs before React: if 404.html redirected here with a ?/… sentinel,
      // restore the real URL via history.replaceState so BrowserRouter sees
      // the correct pathname on first render.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
